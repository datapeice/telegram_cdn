version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: videohosting_db
    restart: always
    environment:
      POSTGRES_DB: videodb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d videodb"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: videohosting_app
    restart: always
    ports:
      - "8888:8080"
    env_file:
      - .env
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/videodb
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres_password
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_WHITELIST: ${TELEGRAM_WHITELIST}
      APP_EXTERNAL_URL: ${APP_EXTERNAL_URL:-http://localhost:8080}
      UPLOAD_DIR: hosted-videos
    volumes:
      - ./hosted-videos:/app/hosted-videos
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:

