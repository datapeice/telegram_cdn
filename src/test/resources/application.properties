spring.application.name=VideoHostingBot-Test

# Test database configuration (H2 In-Memory)
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update

# Upload & File properties for tests
bot.token=PLACEHOLDER_TEST_TOKEN
bot.external-url=http://localhost:8080
bot.upload-dir=build/hosted-videos-test

# Thymeleaf settings
spring.thymeleaf.cache=false
