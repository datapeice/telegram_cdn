spring.application.name=VideoHostingBot

# Database configuration
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/videodb}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update

# Upload & File properties
bot.token=${TELEGRAM_BOT_TOKEN:PLACEHOLDER}
bot.external-url=${APP_EXTERNAL_URL:http://localhost:8080}
bot.upload-dir=${UPLOAD_DIR:hosted-videos}
bot.whitelist=${TELEGRAM_WHITELIST:}

# Thymeleaf settings
spring.thymeleaf.cache=false
spring.thymeleaf.mode=HTML
spring.thymeleaf.encoding=UTF-8

# Nginx Proxy Manager / Reverse Proxy configuration
server.forward-headers-strategy=FRAMEWORK
